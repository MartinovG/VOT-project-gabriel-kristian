<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Task Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 text-slate-800 antialiased font-sans min-h-screen flex flex-col">
    
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fa-solid fa-server"></i>
                DevOps Task Manager
            </h1>
            <div class="text-sm font-medium bg-indigo-500 px-3 py-1 rounded-full cursor-pointer hover:bg-indigo-400 transition" onclick="checkHealth()">
                <i class="fa-solid fa-heart-pulse text-rose-300 mr-1"></i> API Status
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
        <div class="w-full lg:w-1/3">
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 sticky top-8">
                <h2 class="text-lg font-semibold mb-4 text-slate-800">Add New Task</h2>
                <form id="taskForm" class="flex flex-col gap-4">
                    <div>
                        <label for="taskTitle" class="block text-sm font-medium text-slate-600 mb-1">Task Description</label>
                        <textarea id="taskTitle" rows="3" class="w-full rounded-lg border-slate-300 border shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-3 text-sm resize-none" placeholder="E.g. Configure GitHub Actions pipeline..." required></textarea>
                    </div>
                    <button type="submit" class="w-full bg-indigo-600 text-white py-2.5 px-4 rounded-lg font-medium hover:bg-indigo-700 focus:ring-4 focus:ring-indigo-200 transition-colors flex justify-center items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Add Task
                    </button>
                </form>
            </div>
        </div>

        <div class="w-full lg:w-2/3">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800">Active Tasks</h2>
                <span id="taskCount" class="bg-indigo-100 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full">0 tasks</span>
            </div>
            
            <div id="tasksList" class="flex flex-col gap-3">
                <div class="text-center py-10 text-slate-500 animate-pulse">
                    <i class="fa-solid fa-circle-notch fa-spin text-3xl mb-3"></i>
                    <p>Loading tasks from API...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_URL = '/api/tasks';

        document.addEventListener('DOMContentLoaded', fetchTasks);

        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const titleInput = document.getElementById('taskTitle');
            const title = titleInput.value.trim();
            
            if (!title) return;

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, status: 'pending' })
                });

                if (res.ok) {
                    titleInput.value = '';
                    fetchTasks();
                }
            } catch (err) {
                console.error('Error adding task:', err);
                alert('Connection to server failed.');
            }
        });

        async function fetchTasks() {
            const listEl = document.getElementById('tasksList');
            const countEl = document.getElementById('taskCount');
            
            try {
                const res = await fetch(API_URL);
                const result = await res.json();
                
                if (result.success) {
                    const tasks = result.data;
                    countEl.innerText = `${tasks.length} tasks`;
                    
                    if (tasks.length === 0) {
                        listEl.innerHTML = `
                            <div class="bg-white rounded-xl border border-slate-200 p-8 text-center text-slate-500 shadow-sm">
                                <i class="fa-solid fa-clipboard-list text-4xl mb-3 text-slate-300"></i>
                                <p>No tasks found. Create one to get started!</p>
                            </div>
                        `;
                        return;
                    }

                    listEl.innerHTML = tasks.map(task => {
                        const isDone = task.status === 'done';
                        return `
                            <div class="bg-white rounded-xl border ${isDone ? 'border-emerald-200 bg-emerald-50' : 'border-slate-200'} p-4 shadow-sm flex items-center justify-between group transition-all hover:shadow-md">
                                <div class="flex items-center gap-4 flex-grow">
                                    <button onclick="toggleStatus(${task.id}, '${isDone ? 'pending' : 'done'}')" class="text-2xl ${isDone ? 'text-emerald-500' : 'text-slate-300 hover:text-indigo-400'} transition-colors cursor-pointer focus:outline-none">
                                        <i class="fa-${isDone ? 'solid fa-circle-check' : 'regular fa-circle'}"></i>
                                    </button>
                                    <div class="flex flex-col">
                                        <span class="font-medium text-slate-800 ${isDone ? 'line-through text-slate-500' : ''}">${escapeHtml(task.title)}</span>
                                        <span class="text-xs font-mono text-slate-400">ID: #${task.id}</span>
                                    </div>
                                </div>
                                <button onclick="deleteTask(${task.id})" class="text-slate-400 hover:text-rose-500 bg-white hover:bg-rose-50 h-8 w-8 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                                    <i class="fa-solid fa-trash-can"></i>
                                </button>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) {
                console.error('Error fetching tasks:', err);
                listEl.innerHTML = `<div class="text-rose-500 text-center py-10 bg-rose-50 rounded-xl border border-rose-100"><i class="fa-solid fa-triangle-exclamation mb-2 text-2xl"></i><br>Failed to load tasks from API</div>`;
            }
        }

        async function toggleStatus(id, newStatus) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });
                fetchTasks();
            } catch (err) { console.error(err); }
        }

        async function deleteTask(id) {
            if(!confirm('Are you sure you want to delete this task?')) return;
            try {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchTasks();
            } catch (err) { console.error(err); }
        }

        async function checkHealth() {
            try {
                const res = await fetch('/health');
                const data = await res.json();
                alert(`Backend is ONLINE ✅\nUptime: ${Math.round(data.uptime)} seconds`);
            } catch (err) {
                alert(`Backend is OFFLINE ❌`);
            }
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
